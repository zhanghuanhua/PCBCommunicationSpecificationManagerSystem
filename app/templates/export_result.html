{% extends "base.html" %}

{% block content %}
<div class="table-wrap">
  <h2>已生成文件</h2>
  <p class="muted">文件已保存到以下完整路径。</p>
  <ul class="path-list">
    {% for file in absolute_output_files %}
    <li><code>{{ file }}</code></li>
    {% endfor %}
  </ul>
  <a class="button" href="/exports">继续导出</a>
  <a class="button secondary" href="/">返回工作台</a>
</div>
{% endblock %}
