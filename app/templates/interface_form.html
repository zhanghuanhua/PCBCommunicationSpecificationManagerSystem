{% extends "base.html" %}

{% block content %}
<form class="form-panel" method="post" action="/interfaces">
  <input type="hidden" name="spec_version_id" value="{{ spec_version.id }}">
  <section class="form-context">
    <p class="eyebrow">Version {{ spec_version.version }}</p>
    <h2>新增接口</h2>
    <p>{{ spec_version.name }} v{{ spec_version.version }}</p>
  </section>
  <label>
    接口方向
    <select name="direction">
      <option value="EQP_TO_EAP">EQP -> EAP</option>
      <option value="EAP_TO_EQP">EAP -> EQP</option>
    </select>
  </label>
  <label>
    接口编号
    <input name="code" placeholder="例如 EQP-EAP-037" required>
  </label>
  <label>
    接口名称
    <input name="name" placeholder="例如 设备状态上报" required>
  </label>
  <label>
    API 名称
    <input name="api_name" placeholder="例如 EQP_EquipmentCurrentStatus" required>
  </label>
  <label>
    需求说明
    <textarea name="requirement"></textarea>
  </label>
  <label>
    使用场景
    <textarea name="scenario"></textarea>
  </label>
  <label>
    服务描述
    <textarea name="service_description"></textarea>
  </label>
  <label>
    版本
    <input name="version" value="{{ spec_version.version }}">
  </label>
  <label>
    业务模块
    <input name="module">
  </label>

  <section class="inline-parameter-section">
    <div class="section-heading">
      <div>
        <h2>请求参数</h2>
        <p>新增接口时可同步录入请求 Content 参数。</p>
      </div>
    </div>
    <div class="parameter-add-grid">
      <label>
        字段名
        <input name="request_field_name" placeholder="例如 MaData">
      </label>
      <label>
        类型
        <select name="request_data_type_choice">
          {% for type_option in parameter_type_options %}
          <option value="{{ type_option }}">{{ type_option }}</option>
          {% endfor %}
          <option value="CUSTOM">自定义</option>
        </select>
      </label>
      <label>
        自定义类型
        <input name="request_custom_data_type" placeholder="例如 List&lt;Data&gt;">
      </label>
      <label>
        示例值
        <input name="request_example_value" placeholder="例如 D001">
      </label>
      <label class="wide-field">
        字段说明
        <textarea name="request_description"></textarea>
      </label>
    </div>
    <div class="checkbox-row">
      <input type="hidden" name="request_required" value="1">
      <input type="hidden" name="request_is_array" value="0">
    </div>
  </section>

  <section class="inline-parameter-section">
    <div class="section-heading">
      <div>
        <h2>响应参数</h2>
        <p>新增接口时可同步录入响应 Content 参数。</p>
      </div>
    </div>
    <div class="parameter-add-grid">
      <label>
        字段名
        <input name="response_field_name" placeholder="例如 Result">
      </label>
      <label>
        类型
        <select name="response_data_type_choice">
          {% for type_option in parameter_type_options %}
          <option value="{{ type_option }}">{{ type_option }}</option>
          {% endfor %}
          <option value="CUSTOM">自定义</option>
        </select>
      </label>
      <label>
        自定义类型
        <input name="response_custom_data_type" placeholder="例如 List&lt;Data&gt;">
      </label>
      <label>
        示例值
        <input name="response_example_value" placeholder="例如 true">
      </label>
      <label class="wide-field">
        字段说明
        <textarea name="response_description"></textarea>
      </label>
    </div>
    <div class="checkbox-row">
      <input type="hidden" name="response_required" value="1">
      <input type="hidden" name="response_is_array" value="0">
    </div>
  </section>

  <div class="actions">
    <button type="submit">保存接口</button>
    <a href="/specs/{{ spec_version.id }}">取消</a>
  </div>
</form>
{% endblock %}
