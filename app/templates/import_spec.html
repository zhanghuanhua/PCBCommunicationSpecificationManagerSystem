{% extends "base.html" %}

{% block content %}
<section class="hero-panel">
  <div>
    <p class="eyebrow">Specification Template</p>
    <h2>导入原规格书</h2>
    <p>上传现有《珠海超毅 EAP-EQP API 接口通讯规格书4.0》，作为后续导出的基础模板。</p>
  </div>
</section>

<section class="form-panel import-panel">
  {% if message %}
  <div class="success-block">
    <strong>{{ message }}</strong>
    <span>{{ template.original_filename }}</span>
  </div>
  {% endif %}
  <form method="post" action="/imports/spec" enctype="multipart/form-data">
    <label>
      选择 Word 文件
      <input type="file" name="spec_file" accept=".docx" required>
    </label>
    <div class="radio-list">
      <label class="radio-row">
        <input type="radio" checked>
        <span>
          <strong>作为模板导入</strong>
          <small>保留原文档内容，导出时在接口章节后追加系统新增接口。</small>
        </span>
      </label>
      <label class="radio-row disabled">
        <input type="radio" disabled>
        <span>
          <strong>解析接口草稿</strong>
          <small>读取文档接口内容并生成待确认接口数据，后续版本支持。</small>
        </span>
      </label>
    </div>
    <div class="actions">
      <button type="submit">开始导入</button>
      <a href="/">返回工作台</a>
    </div>
  </form>
</section>
{% endblock %}
